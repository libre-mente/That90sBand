<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>
    {% if page.title %}{{ page.title }} — {% endif %}
    {{ site.title }}
  </title>

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="topbar">
    <div class="wrap topbar-inner">
      <a class="brand" href="{{ '/' | relative_url }}">
        <span class="brand-spark">✦</span> {{ site.title }}
      </a>

      <nav class="nav" aria-label="Primary">
        <a href="{{ '/events' | relative_url }}">Events</a>
        <a href="{{ '/booking' | relative_url }}">Booking</a>
        <a href="{{ '/bios' | relative_url }}">Bios</a>
        <a href="{{ '/link-tree' | relative_url }}">Link Tree</a>
        <a href="{{ '/about' | relative_url }}">About</a>
        <a href="{{ '/contact' | relative_url }}">Contact</a>
      </nav>
    </div>
  </header>

  <main id="main" class="wrap main" role="main">
    {{ content }}
  </main>

  <footer class="footer">
    <div class="wrap footer-inner">
      <span>© {{ site.time | date: "%Y" }} {{ site.title }} • All rights reserved</span>
      <span class="footer-links">
        <a href="{{ '/booking' | relative_url }}">Book Us</a>
        <a href="{{ '/events' | relative_url }}">Events</a>
      </span>
    </div>
  </footer>
</body>
</html>
